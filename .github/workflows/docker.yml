name: Build and Publish Image

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/thehapyone/code-interpreter
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Build image for health check
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: code-interpreter:local
          build-args: |
            APP_UID=1000
            APP_GID=1000

      - name: Health check
        run: |
          set -euo pipefail
          docker run -d --rm -p 8000:8000 --name code-interpreter-smoke code-interpreter:local
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health >/dev/null; then
              echo "Health check passed";
              docker stop code-interpreter-smoke
              exit 0
            fi
            echo "Waiting for container... ($i/30)"
            sleep 1
          done
          docker logs code-interpreter-smoke || true
          docker stop code-interpreter-smoke || true
          exit 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_UID=1000
            APP_GID=1000
