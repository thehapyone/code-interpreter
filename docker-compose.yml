---
services:
  code-interpreter:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    image: ghcr.io/thehapyone/code-interpreter:latest
    container_name: mcp-code-interpreter
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - MAX_SESSIONS=50
      - EXECUTION_TIMEOUT=300
      - SUBPROCESS_MAX_MEMORY_MB=${SUBPROCESS_MAX_MEMORY_MB:-0}
      - SUBPROCESS_MAX_CPU_SECONDS=${SUBPROCESS_MAX_CPU_SECONDS:-0}
      - BASH_STRICT_MODE=${BASH_STRICT_MODE:-1}
    volumes:
      - ./notebooks:/app/notebooks
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "2"
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
